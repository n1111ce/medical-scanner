name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias mediscan \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass mediscan123 -keypass mediscan123 \
            -dname "CN=MediScan,O=MediScan,C=JO"

      - name: Add signing config to gradle.properties
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=release.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=mediscan"          >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=mediscan123"  >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=mediscan123"    >> android/gradle.properties

      - name: Patch build.gradle to use release signing
        run: |
          python3 - <<'EOF'
          import re, sys

          path = "android/app/build.gradle"
          with open(path) as f:
              content = f.read()

          signing_block = """
              release {
                  if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                  }
              }
          """

          # Insert release signing config after debug signingConfig block
          content = re.sub(
              r'(signingConfigs\s*\{[^}]*debug\s*\{[^}]*\})',
              r'\1' + signing_block,
              content,
              count=1
          )

          # Switch release buildType to use release signingConfig
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content,
              count=1
          )

          with open(path, "w") as f:
              f.write(content)

          print("build.gradle patched OK")
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediScan-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
